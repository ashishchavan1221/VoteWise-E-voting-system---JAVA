<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results - VoteWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js inclusion -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-[#0b1120] text-gray-200 min-h-screen font-sans pattern-bg">

    <style>
        .pattern-bg {
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .stat-card {
            background: linear-gradient(145deg, rgba(30,41,59,0.7) 0%, rgba(15,23,42,0.9) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
    </style>

    <!-- NAVBAR -->
    <nav class="bg-[#0f172a]/80 backdrop-blur-lg sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-3xl font-bold text-white tracking-tighter">Vote<span class="text-blue-500">Wise</span></a>
            </div>
            <div class="flex items-center gap-6">
                <a href="dashboard.html" class="text-sm font-semibold text-gray-300 hover:text-white transition bg-white/10 px-4 py-2 rounded-full border border-white/10">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- HEADER -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12">
            <div>
                <div class="inline-flex items-center gap-2 px-3 py-1 bg-red-500/10 text-red-500 border border-red-500/20 rounded-full font-bold text-xs uppercase tracking-wider mb-4 animate-pulse">
                    <div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgb(239,68,68)]"></div>
                    Live Polling Data
                </div>
                <h1 class="text-4xl md:text-6xl font-extrabold text-white tracking-tight">Election Results</h1>
                <p class="text-xl text-gray-400 mt-2">Real-time vote counting analytics and graphical distribution.</p>
            </div>
            <div class="mt-8 md:mt-0 text-left md:text-right border-l-4 md:border-l-0 md:border-r-4 border-blue-500 pl-4 md:pl-0 md:pr-4">
                <p class="text-sm text-blue-400 font-bold uppercase tracking-wider mb-1">Total Votes Cast</p>
                <div class="text-5xl font-bold text-white tracking-tighter drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]" id="totalVotesStat">0</div>
            </div>
        </div>

        <!-- STATS ROW (Leaderboard) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12" id="leaderBoard">
            <!-- Cards Injected via JS -->
        </div>

        <!-- CHARTS SECTION -->
        <div class="grid lg:grid-cols-3 gap-8 mb-20">
            <!-- Bar Chart (Main Area) -->
            <div class="lg:col-span-2 stat-card rounded-3xl p-8 shadow-2xl relative overflow-hidden">
                <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-600/10 rounded-full blur-3xl"></div>
                <h3 class="text-2xl font-bold text-white mb-6">Aggregate Vote Distribution</h3>
                <div class="relative h-80 w-full">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <!-- Doughnut Chart (Side Area) -->
            <div class="stat-card rounded-3xl p-8 shadow-2xl relative overflow-hidden flex flex-col items-center">
                <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-emerald-600/10 rounded-full blur-3xl"></div>
                <h3 class="text-2xl font-bold text-white mb-6 self-start">Vote Share %</h3>
                <div class="relative h-64 w-full flex justify-center mt-auto mb-auto">
                    <canvas id="doughnutChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <!-- FOOTER inside results for cleaner look -->
    <footer class="border-t border-gray-800 text-center py-8">
         <p class="text-gray-500 text-sm">Secured by VoteWise End-to-End Encryption System © 2026</p>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // STRICT VOTING INTEGRITY CHECK
        const currentUser = localStorage.getItem("currentUser");
        if(!currentUser) {
            window.location.href = "login.html";
        } else {
            const hasVoted = localStorage.getItem(`voted_${currentUser}`);
            if(!hasVoted) {
                alert("🔒 Voting Integrity Rule: You must cast your own vote first before viewing the live election results to prevent the bandwagon effect.");
                window.location.href = "dashboard.html";
            }
        }

        // Constants (Mapping candidate data)
        const candidates = [
            { id: 1, name: "Rahul Sharma", party: "Student Union", color: "#3b82f6", bg: "rgba(59, 130, 246, 0.8)", rankColor: "text-amber-400", icon: "fa-bullhorn" },
            { id: 2, name: "Priya Patel", party: "Tech Innovators", color: "#10b981", bg: "rgba(16, 185, 129, 0.8)", rankColor: "text-gray-300", icon: "fa-laptop-code" },
            { id: 3, name: "Amit Singh", party: "Cultural Council", color: "#f97316", bg: "rgba(249, 115, 22, 0.8)", rankColor: "text-orange-400", icon: "fa-masks-theater" }
        ];

        // Fetch Data Logic
        function getVoteData() {
            // Retrieve simulated votes cast during this session
            const localVotes = JSON.parse(localStorage.getItem("mock_results") || "{}");
            
            // Base dataset to make charts look great globally
            const baseVotes = { 1: 1420, 2: 2150, 3: 890 };
            
            return candidates.map(c => ({
                ...c,
                votes: (baseVotes[c.id] || 0) + (localVotes[c.id] || 0)
            })).sort((a,b) => b.votes - a.votes); // Auto sort by highest votes
        }

        function initDashboard() {
            const data = getVoteData();
            const totalVotes = data.reduce((sum, c) => sum + c.votes, 0);
            
            // Animated Counter for Total Votes
            let start = 0;
            const target = totalVotes;
            const duration = 1500;
            const inc = target / (duration / 16);
            const counter = setInterval(() => {
                start += inc;
                if(start >= target) {
                    start = target;
                    clearInterval(counter);
                }
                document.getElementById("totalVotesStat").innerText = Math.floor(start).toLocaleString();
            }, 16);

            // Populate Leaderboard Cards
            const leaderBoard = document.getElementById("leaderBoard");
            leaderBoard.innerHTML = data.map((c, i) => `
                <div class="stat-card rounded-2xl p-6 relative overflow-hidden group hover:-translate-y-1 transition duration-300 hover:shadow-[0_0_20px_rgba(255,255,255,0.05)] border-t border-t-white/10 flex flex-col h-full">
                    <div class="absolute top-0 right-0 p-4">
                        <i class="fa-solid fa-trophy ${i === 0 ? 'text-amber-400 text-4xl drop-shadow-[0_0_10px_rgba(251,191,36,0.6)]' : i === 1 ? 'text-gray-400 text-3xl' : 'text-orange-700 text-2xl'} transition transform group-hover:scale-110"></i>
                    </div>
                    
                    <div class="flex items-center gap-4 mb-5">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg transform group-hover:rotate-12 transition duration-300" style="background: ${c.color}">
                            <i class="fa-solid ${c.icon} text-white text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">ID: ${c.id} • Rank #${i + 1}</p>
                            <h3 class="text-xl font-bold text-white truncate pr-6">${c.name}</h3>
                            <p class="text-xs font-medium text-gray-400">${c.party}</p>
                        </div>
                    </div>

                    <div class="mt-auto">
                        <div class="flex items-baseline gap-2">
                            <span class="text-4xl font-extrabold" style="color: ${c.color}">${c.votes.toLocaleString()}</span>
                            <span class="text-gray-500 font-medium text-sm">total votes</span>
                        </div>
                        <div class="w-full bg-gray-800 h-2 rounded-full mt-4 overflow-hidden shadow-inner hidden-anim">
                            <div class="h-full rounded-full transition-all duration-1000 ease-out relative" style="width: ${(c.votes/totalVotes)*100}%; background-color: ${c.color}">
                               <div class="absolute inset-0 bg-white/20"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            // Call Chart initialization
            initCharts(data);
        }

        // Setup Chart.js
        function initCharts(data) {
            Chart.defaults.color = '#94a3b8'; // Slate 400
            Chart.defaults.font.family = 'Inter, sans-serif';
            
            const labels = data.map(c => c.name);
            const votes = data.map(c => c.votes);
            const colors = data.map(c => c.color);
            const bgColors = data.map(c => c.bg);

            // Main Bar Chart
            const ctxBar = document.getElementById('barChart').getContext('2d');
            new Chart(ctxBar, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Votes Cast',
                        data: votes,
                        backgroundColor: bgColors,
                        borderColor: colors,
                        borderWidth: 2,
                        borderRadius: 8,
                        barPercentage: 0.5,
                        hoverBackgroundColor: colors
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleFont: { size: 16 },
                            bodyFont: { size: 15, weight: 'bold' },
                            padding: 16,
                            cornerRadius: 12,
                            displayColors: false,
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: 'rgba(255, 255, 255, 0.05)', borderDash: [5, 5] },
                            border: { display: false },
                            ticks: { font: { size: 12 } }
                        },
                        x: {
                            grid: { display: false },
                            border: { display: false },
                            ticks: { font: { weight: 'bold', size: 14, color: '#e2e8f0' } }
                        }
                    },
                    animation: {
                        duration: 2000,
                        easing: 'easeOutQuart'
                    }
                }
            });

            // Side Doughnut Chart
            const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');
            new Chart(ctxDoughnut, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: votes,
                        backgroundColor: colors,
                        borderWidth: 0,
                        hoverOffset: 12
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 25,
                                font: { size: 13, weight: 'bold', color: '#e2e8f0' },
                                usePointStyle: true,
                                pointStyle: 'circle'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            bodyFont: { size: 15, weight: 'bold' },
                            padding: 16,
                            cornerRadius: 12,
                            callbacks: {
                                label: function(context) {
                                    let total = context.chart._metasets[context.datasetIndex].total;
                                    let percentage = Math.round((context.parsed / total) * 100);
                                    return ` ${context.label}: ${percentage}%`;
                                }
                            }
                        }
                    },
                    animation: {
                        animateScale: true,
                        animateRotate: true,
                        duration: 2500,
                        easing: 'easeOutQuart'
                    }
                }
            });
        }

        document.addEventListener("DOMContentLoaded", initDashboard);
    </script>
</body>
</html>
