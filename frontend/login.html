<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VoteWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 text-[#0f172a] h-screen overflow-hidden">
    <div class="flex w-full h-full">
        <!-- Left Side: Image / Branding -->
        <div class="hidden lg:flex flex-col justify-center items-center w-1/2 bg-[#0f172a] relative overflow-hidden">
            <div
                class="absolute top-0 right-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob">
            </div>
            <div
                class="absolute bottom-0 left-0 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000">
            </div>

            <div
                class="relative z-10 flex flex-col items-center justify-center h-full w-full p-12 text-center text-white">
                <div class="mb-10 w-4/5 max-w-md mx-auto">
                    <img src="images/auth_bg.png" alt="Secure Voting" class="w-full h-auto drop-shadow-2xl floating">
                </div>
                <h2 class="text-4xl font-bold mb-4">Secure. Anonymous. Verifiable.</h2>
                <p class="text-lg text-gray-300 max-w-sm">Join the digital revolution of democracy. Your vote is
                    protected by military-grade encryption.</p>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center bg-white p-8 overflow-y-auto">
            <div class="w-full max-w-md">
                <!-- Mobile Header -->
                <div class="flex justify-center mb-8 lg:hidden">
                    <span class="text-4xl font-bold">Vote<span class="text-blue-600">Wise</span></span>
                </div>

                <div class="mb-10">
                    <div class="hidden lg:block mb-6">
                        <a href="index.html" class="text-4xl font-bold cursor-pointer">Vote<span
                                class="text-blue-600">Wise</span></a>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back! 👋</h2>
                    <p class="text-gray-500">Please enter your credentials to login and cast your vote.</p>
                </div>

                <form id="loginForm" class="space-y-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2" for="voterId">Voter ID
                            Number</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-id-card text-gray-400"></i>
                            </div>
                            <input type="text" id="voterId" placeholder="Enter your 8-digit Voter ID"
                                class="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200"
                                required>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2" for="password">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" placeholder="••••••••"
                                class="w-full pl-11 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200"
                                required>
                        </div>
                        <div class="flex justify-end mt-2">
                            <a href="#" class="text-sm font-semibold text-blue-600 hover:text-blue-700">Forgot
                                Password?</a>
                        </div>
                    </div>

                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-1 transition duration-300 flex items-center justify-center gap-2 group">
                        <span>Secure Login</span>
                        <i
                            class="fa-solid fa-arrow-right-to-bracket transition-transform group-hover:translate-x-1"></i>
                    </button>
                </form>

                <p class="text-center mt-8 text-gray-600 font-medium">
                    Don't have an account yet?
                    <a href="register.html" class="text-blue-600 font-bold hover:underline">Create an account</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        .floating {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
    <script src="js/script.js"></script>
    <script>
        document.getElementById("loginForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const voterId = document.getElementById("voterId").value;
            const password = document.getElementById("password").value;

            // Backend Integration logic - Java API
            try {
                const response = await fetch('http://localhost:8085/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ voterId, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("currentUser", data.voterId || voterId);
                    localStorage.setItem("token", data.token); // Optional JWT
                    showAlert("✅ Login Successful!");
                    setTimeout(() => window.location.href = "dashboard.html", 1000);
                } else {
                    const error = await response.text();
                    showAlert("❌ " + (error || "Invalid Credentials"), "error");
                }
            } catch (err) {
                // Fallback UI test flow for development
                console.warn("Backend not running, simulating login.");
                localStorage.setItem("currentUser", voterId);
                showAlert("✅ Test Login Simulated!");
                setTimeout(() => window.location.href = "dashboard.html", 1500);
            }
        });
    </script>
</body>

</html>
