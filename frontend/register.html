<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VoteWise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-[#0f172a] min-h-screen overflow-x-hidden md:h-screen md:overflow-hidden">
    <div class="flex flex-col md:flex-row w-full h-full">
        <!-- Right Side: Image / Branding (Reversed for Register page) -->
        <div class="hidden lg:flex flex-col justify-center items-center w-1/2 bg-[#0f172a] relative overflow-hidden order-last">
            <div class="absolute top-0 right-0 w-96 h-96 bg-green-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
            <div class="absolute bottom-0 left-0 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>
            
            <div class="relative z-10 flex flex-col items-center justify-center h-full w-full p-12 text-center text-white">
                <div class="mb-10 w-4/5 max-w-md mx-auto">
                    <!-- Changed src to the generated image -->
                    <img src="images/auth_bg.png" alt="Secure Voting Vault" class="w-full h-auto drop-shadow-2xl floating">
                </div>
                <h2 class="text-4xl font-bold mb-4">Empower Your Future.</h2>
                <p class="text-lg text-gray-300 max-w-sm">One voter, one vote. Securely verify your identity and become a part of the online democratic system.</p>
            </div>
        </div>

        <!-- Left Side: Register Form -->
        <div class="w-full lg:w-1/2 flex items-center justify-center bg-white p-8 overflow-y-auto">
            <div class="w-full max-w-md my-auto">
                <!-- Mobile Header -->
                <div class="flex justify-center mb-6 lg:hidden">
                    <span class="text-4xl font-bold">Vote<span class="text-blue-600">Wise</span></span>
                </div>
                
                <div class="mb-8 mt-6">
                    <div class="hidden lg:block mb-6">
                        <a href="index.html" class="text-4xl font-bold cursor-pointer">Vote<span class="text-blue-600">Wise</span></a>
                    </div>
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">Create an Account ✨</h2>
                    <p class="text-gray-500">Register with your Voter ID to participate securely.</p>
                </div>
                
                <form id="registerForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" for="fullName">Full Name</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-user text-gray-400"></i>
                            </div>
                            <input type="text" id="fullName" placeholder="As per Voter ID" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200" required>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1" for="voterId">Voter ID</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-id-card text-gray-400"></i>
                                </div>
                                <input type="text" id="voterId" placeholder="12345678" class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1" for="college">College</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-graduation-cap text-gray-400"></i>
                                </div>
                                <input type="text" id="college" placeholder="E.g. LPU" class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200" required>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1" for="email">Email</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-envelope text-gray-400"></i>
                                </div>
                                <input type="email" id="email" placeholder="you@example.com" class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200" required>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1" for="age">Age</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <i class="fa-solid fa-calendar text-gray-400"></i>
                                </div>
                                <input type="number" id="age" min="18" placeholder="Must be 18+" class="w-full pl-10 pr-3 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200" required>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1" for="password">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" placeholder="Create a strong password" class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition duration-200" required>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-blue-600/30 hover:bg-blue-700 hover:-translate-y-1 transition duration-300 flex items-center justify-center gap-2 group mt-2">
                        <span>Register Now</span>
                        <i class="fa-solid fa-user-plus transition-transform group-hover:scale-110"></i>
                    </button>
                </form>

                <p class="text-center mt-6 text-gray-600 font-medium pb-8 lg:pb-0">
                    Already registered? 
                    <a href="login.html" class="text-blue-600 font-bold hover:underline">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <style>
        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
    </style>
    <script src="js/script.js"></script>
    <script>
        document.getElementById("registerForm").addEventListener("submit", async function(e){
            e.preventDefault();
            
            const payload = {
                name: document.getElementById("fullName").value,
                voterId: document.getElementById("voterId").value,
                college: document.getElementById("college").value,
                email: document.getElementById("email").value,
                age: document.getElementById("age").value,
                password: document.getElementById("password").value
            };
            
            if(parseInt(payload.age) < 18) {
                showAlert("❌ You must be 18 or older to register to vote.", "error");
                return;
            }

            // Backend Integration logic - Java API
            try {
                const response = await fetch('http://localhost:8085/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(response.ok) {
                    showAlert("✅ Registration Successful!");
                    setTimeout(() => window.location.href = "login.html", 1500);
                } else {
                    const error = await response.text();
                    showAlert("❌ " + (error || "Registration Failed"), "error");
                }
            } catch (err) {
                // Fallback UI test flow for development
                console.warn("Backend not running, simulating registration.");
                showAlert("✅ Test Registration Flow Complete!");
                setTimeout(() => window.location.href = "login.html", 1500);
            }
        });
    </script>
</body>
</html>
